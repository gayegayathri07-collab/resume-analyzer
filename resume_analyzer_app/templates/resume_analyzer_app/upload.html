<!DOCTYPE html>
<html>
<head>
    <title>AI Resume Analyzer Pro</title>
</head>
<body>
    <h1>AI Resume Analyzer Pro</h1>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <input type="file" name="resume" accept=".pdf,.docx">
        <textarea name="job_description" placeholder="Paste Job Description here"></textarea>
        <button type="submit">Analyze</button>
    </form>

    {% if analysis %}
    <div style="border: 1px solid #ccc; padding: 15px; margin-top: 20px;">
        <h2>Analysis Results</h2>
        <p>ATS Score: {{ analysis.ats_score }}</p>
        <p>Job Match Score: {{ analysis.match_score }}</p>
        
        <a href="{% url 'export_pdf' %}">Download PDF Report</a>
    </div>
    {% endif %}
</body>
</html>
